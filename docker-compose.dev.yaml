services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command:
      - npm
      - run
      - dev
    ports:
      - "8081:8081"
    networks:
      - leopple-games-network
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./node_modules:/app/node_modules
      - ./apps/backend/node_modules:/app/apps/backend/node_modules

networks:
  leopple-games-network: