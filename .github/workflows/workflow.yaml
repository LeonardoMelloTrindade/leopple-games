name: CI

on: pull_request

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "npm"
      
      - name: Run install Node.js
        run: |
          npm install

      - name: Run check-types
        run: |
          npm run check-types
      
      - name: Run lint
        run: |
          npm run lint